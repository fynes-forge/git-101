name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Practice Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check all grade practice files exist
        run: |
          echo "Checking grade practice files..."
          for grade in 2 3 5 6 7 8; do
            file="grades/grade-${grade}/practice.txt"
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              exit 1
            else
              echo "✅ Found: $file"
            fi
          done

      - name: Check all grade READMEs exist
        run: |
          echo "Checking grade READMEs..."
          for grade in 1 2 3 4 5 6 7 8; do
            file="grades/grade-${grade}/README.md"
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              exit 1
            else
              echo "✅ Found: $file"
            fi
          done

      - name: Check .gitignore exists
        run: |
          if [ ! -f ".gitignore" ]; then
            echo "❌ Missing .gitignore"
            exit 1
          fi
          echo "✅ .gitignore found"

      - name: All checks passed
        run: echo "🎉 All checks passed!"
